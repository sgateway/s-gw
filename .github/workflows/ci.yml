name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality:
    name: TypeScript, tests, and package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SGW_E2E_CHROME: /usr/bin/google-chrome
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check:rust
      - run: npm run check
      - run: npm run build
      - run: npm test
      - run: npm audit --audit-level=high
      - run: npm run package:dry-run

  macos-native:
    name: macOS native surfaces
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build:native
      - run: npx vitest run tests/install-macos.test.ts tests/native-appstate.test.ts tests/native-menubar.test.ts tests/native-command-surface.test.ts tests/native-readiness-ui.test.ts

  windows-preview:
    name: Windows preview client
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check
      - run: npm run build:windows-client
      - run: npx tsc -p tsconfig.json
      - run: npx vitest run tests/windows-client.test.ts tests/installers.test.ts tests/agents.test.ts tests/agent-install.test.ts tests/agent-install-windows.test.ts

name: Publish release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Annotated tag to verify and publish
        required: true
        type: string
      publish_release:
        description: Publish the verified draft release after its assets upload
        required: true
        default: true
        type: boolean
      macos_distribution:
        description: macOS release channel. Unsigned previews are manual-download only.
        required: true
        default: notarized
        type: choice
        options:
          - notarized
          - unsigned-preview

concurrency:
  group: publish-${{ inputs.release_tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-assets:
    if: github.repository == 'sgateway/s-gw'
    runs-on: macos-15
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      MACOS_DISTRIBUTION: ${{ inputs.macos_distribution }}
      SGW_RELEASE_TAG: ${{ inputs.release_tag }}
      SGW_REQUIRE_RUST_CORE: "1"
      SGW_RUST_CORE_DIR: ${{ github.workspace }}/.private/sgw-core
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          ref: ${{ inputs.release_tag }}

      - name: Check out private Rust core
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: barryqy/s-gw-rust-core
          token: ${{ secrets.SGW_CORE_REPO_TOKEN }}
          ref: ${{ inputs.release_tag }}
          path: .private/sgw-core
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - run: rustup toolchain install 1.96.1 --profile minimal --component rustfmt,clippy
      - run: npm ci --ignore-scripts

      - name: Configure macOS distribution signing
        if: inputs.macos_distribution == 'notarized'
        env:
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          test -n "$APPLE_DEVELOPER_ID_P12_BASE64"
          test -n "$APPLE_DEVELOPER_ID_P12_PASSWORD"
          test -n "$APPLE_NOTARY_KEY_P8_BASE64"
          test -n "$APPLE_NOTARY_KEY_ID"
          test -n "$APPLE_NOTARY_ISSUER_ID"

          keychain="$RUNNER_TEMP/s-gw-signing.keychain-db"
          certificate="$RUNNER_TEMP/s-gw-developer-id.p12"
          notary_key="$RUNNER_TEMP/s-gw-notary-key.p8"
          keychain_password="$(uuidgen)"
          trap 'rm -f "$certificate" "$notary_key"' EXIT

          printf '%s' "$APPLE_DEVELOPER_ID_P12_BASE64" | base64 -D > "$certificate"
          printf '%s' "$APPLE_NOTARY_KEY_P8_BASE64" | base64 -D > "$notary_key"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$certificate" -k "$keychain" -P "$APPLE_DEVELOPER_ID_P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain"
          security default-keychain -d user -s "$keychain"

          identity="$(security find-identity -v -p codesigning "$keychain" | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p')"
          test -n "$identity"
          xcrun notarytool store-credentials s-gw-notary \
            --key "$notary_key" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --keychain "$keychain"
          {
            echo "SGW_MACOS_SIGN_IDENTITY=$identity"
            echo "SGW_NOTARY_PROFILE=s-gw-notary"
            echo "SGW_REQUIRE_NOTARIZATION=1"
            echo "SGW_MACOS_DISTRIBUTION=notarized"
          } >> "$GITHUB_ENV"

      - name: Configure unsigned macOS preview
        if: inputs.macos_distribution == 'unsigned-preview'
        run: echo "SGW_MACOS_DISTRIBUTION=unsigned-preview" >> "$GITHUB_ENV"

      - name: Verify release version
        run: |
          package_version="$(node -p "require('./package.json').version")"
          if [ "$MACOS_DISTRIBUTION" = "unsigned-preview" ]; then
            case "$package_version" in *-unsigned.[0-9]*) ;; *) exit 1 ;; esac
            test "$RELEASE_TAG" = "unsigned-macos-preview-v${package_version}"
          else
            test "v${package_version}" = "$RELEASE_TAG"
          fi

      - name: Verify release build
        run: |
          npm run build
          npm run check:rust
          npm run build:rust-core
          npx vitest run --testTimeout 15000
          npm audit --audit-level=high
          npm run package:dry-run
      - run: npm run validate:npm-package
      - run: npm run build:installers

      - name: Verify macOS installer distribution
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          distribution="$(node -p "require('./dist/installers/RELEASE.json').macosDistribution")"
          notarized="$(node -p "require('./dist/installers/RELEASE.json').notarized")"
          test "$distribution" = "$MACOS_DISTRIBUTION"
          if [ "$MACOS_DISTRIBUTION" = "notarized" ]; then
            test "$notarized" = "true"
            spctl --assess --type open --context context:primary-signature "dist/installers/s-gw-${package_version}-macos.dmg"
          else
            test "$notarized" = "false"
            test -f "dist/installers/s-gw-${package_version}-macos-unsigned-preview.dmg"
          fi

      - name: Prepare release notes
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          notes="$RUNNER_TEMP/release-notes.md"
          if [ "$MACOS_DISTRIBUTION" = "unsigned-preview" ]; then
            cat > "$notes" <<EOF
          ## Unsigned macOS preview

          The Apple Silicon DMG in this release is an unsigned preview. It is not Developer ID signed or notarized, so macOS will require an explicit Gatekeeper override to open it. It is deliberately not used by s-gw's automatic macOS update channel.

          If you prefer not to override Gatekeeper, install this exact release through npm instead (Node.js 20+):

          \`\`\`bash
          npm install -g https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/s-gw-${package_version}.tgz
          s-gw setup
          \`\`\`
          EOF
          else
            cat > "$notes" <<EOF
          ## macOS installation

          Drag \`s-gw.app\` from the Apple Silicon DMG to Applications, then open it to complete setup.
          EOF
          fi
          echo "SGW_RELEASE_NOTES=$notes" >> "$GITHUB_ENV"

      - name: Create or verify a draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            test "$(gh release view "$RELEASE_TAG" --json isDraft --jq '.isDraft')" = "true"
            expected_prerelease=false
            if [ "$MACOS_DISTRIBUTION" = "unsigned-preview" ]; then expected_prerelease=true; fi
            test "$(gh release view "$RELEASE_TAG" --json isPrerelease --jq '.isPrerelease')" = "$expected_prerelease"
            exit 0
          fi
          if [ "$MACOS_DISTRIBUTION" = "unsigned-preview" ]; then
            package_version="$(node -p "require('./package.json').version")"
            gh release create "$RELEASE_TAG" --draft --prerelease --latest=false --verify-tag \
              --title "s-gw ${package_version} unsigned macOS preview" \
              --notes-file "$SGW_RELEASE_NOTES"
          else
            gh release create "$RELEASE_TAG" --draft --verify-tag --generate-notes \
              --notes "$(cat "$SGW_RELEASE_NOTES")"
          fi

      - name: Upload verified release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          package_version="$(node -p "require('./package.json').version")"
          bridge="dist/installers/0-s-gw-legacy-${package_version}.tgz"

          for asset in dist/installers/*; do
            gh release delete-asset "$RELEASE_TAG" "$(basename "$asset")" --yes >/dev/null 2>&1 || true
          done

          for checksum in dist/installers/*.sha256 dist/installers/SHA256SUMS.txt; do
            gh release upload "$RELEASE_TAG" "$checksum"
          done

          gh release upload "$RELEASE_TAG" "$bridge"
          for asset in dist/installers/*; do
            case "$asset" in
              "$bridge"|*.sha256|*/SHA256SUMS.txt) continue ;;
            esac
            gh release upload "$RELEASE_TAG" "$asset"
          done

          release_id="$(gh release view "$RELEASE_TAG" --json databaseId --jq '.databaseId')"
          test -n "$release_id"

          first_tgz="$(gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}" --jq '[.assets[] | select(.name | endswith(".tgz"))][0].name')"
          test "$first_tgz" = "$(basename "$bridge")"

          uploaded="$(gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}" --jq '.assets[] | select(.state == "uploaded") | .name')"
          for asset in dist/installers/*; do
            name="$(basename "$asset")"
            printf '%s\n' "$uploaded" | grep -Fqx "$name"
          done

  publish-release:
    needs: release-assets
    if: github.repository == 'sgateway/s-gw' && inputs.publish_release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      MACOS_DISTRIBUTION: ${{ inputs.macos_distribution }}
    steps:
      - name: Publish the verified draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "$(gh release view "$RELEASE_TAG" --json isDraft --jq '.isDraft')" = "true"
          expected_prerelease=false
          if [ "$MACOS_DISTRIBUTION" = "unsigned-preview" ]; then expected_prerelease=true; fi
          test "$(gh release view "$RELEASE_TAG" --json isPrerelease --jq '.isPrerelease')" = "$expected_prerelease"
          gh release edit "$RELEASE_TAG" --draft=false
          test "$(gh release view "$RELEASE_TAG" --json isDraft --jq '.isDraft')" = "false"

  publish-npm:
    needs: publish-release
    if: github.repository == 'sgateway/s-gw' && needs.publish-release.result == 'success' && inputs.macos_distribution == 'notarized'
    runs-on: macos-15
    environment: npm
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      SGW_REQUIRE_RUST_CORE: "1"
      SGW_RUST_CORE_DIR: ${{ github.workspace }}/.private/sgw-core
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          ref: ${{ inputs.release_tag }}

      - name: Check out private Rust core
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: barryqy/s-gw-rust-core
          token: ${{ secrets.SGW_CORE_REPO_TOKEN }}
          ref: ${{ inputs.release_tag }}
          path: .private/sgw-core
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - run: rustup toolchain install 1.96.1 --profile minimal --component rustfmt,clippy
      - run: npm ci --ignore-scripts
      - run: npm run verify

      - name: Verify release version
        run: |
          package_version="$(node -p "require('./package.json').version")"
          test "v${package_version}" = "${RELEASE_TAG}"

      - name: Validate native npm package
        run: |
          npm run validate:npm-package
          for binary in \
            dist/native/darwin-arm64/s-gw-core \
            dist/native/darwin-arm64/s-gw-keychain-helper \
            dist/native/darwin-arm64/s-gw-keychain-inspector \
            dist/s-gw.app/Contents/MacOS/s-gw \
            "dist/s-gw Menu Bar.app/Contents/MacOS/s-gw-menu-bar-helper"; do
            lipo "$binary" -verify_arch arm64
          done

      - name: Publish to npm
        run: npm publish --access public --ignore-scripts

      - name: Verify published npm package
        run: |
          package_version="$(node -p "require('./package.json').version")"
          prefix="${RUNNER_TEMP}/s-gw-npm-${package_version}"
          installed=0
          for _ in 1 2 3 4 5 6; do
            rm -rf "$prefix"
            if npm install --global --prefix "$prefix" --ignore-scripts --no-audit --no-fund --prefer-online "@s-gw/s-gw@${package_version}"; then
              installed=1
              break
            fi
            sleep 10
          done
          test "$installed" = 1

          package_root="$prefix/lib/node_modules/@s-gw/s-gw"
          test -x "$prefix/bin/s-gw"
          test -x "$package_root/dist/native/darwin-arm64/s-gw-core"
          test -x "$package_root/dist/native/darwin-arm64/s-gw-keychain-helper"
          test -x "$package_root/dist/native/darwin-arm64/s-gw-keychain-inspector"
          test -x "$package_root/dist/s-gw.app/Contents/MacOS/s-gw"
          test -x "$package_root/dist/s-gw Menu Bar.app/Contents/MacOS/s-gw-menu-bar-helper"
          test ! -e "$package_root/dist/native/s-gw-core"
          test ! -e "$package_root/dist/native/s-gw-core.exe"
          test ! -e "$package_root/dist/native/s-gw-keychain-helper"
          test "$("$package_root/dist/native/darwin-arm64/s-gw-core" --version)" = "sgw-core ${package_version}"
          "$prefix/bin/s-gw" help >/dev/null
          lipo "$package_root/dist/native/darwin-arm64/s-gw-core" -verify_arch arm64

  publish-registry:
    needs: publish-npm
    if: always() && github.repository == 'sgateway/s-gw' && inputs.macos_distribution == 'notarized' && needs.publish-npm.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          ref: ${{ inputs.release_tag }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify npm publication
        run: |
          package_version="$(node -p "require('./package.json').version")"
          for _ in 1 2 3 4 5 6; do
            if npm view "@s-gw/s-gw@${package_version}" version; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Install MCP Registry publisher
        run: |
          curl -fsSL \
            https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz \
            -o mcp-publisher.tar.gz
          echo "ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac  mcp-publisher.tar.gz" | sha256sum -c -
          tar -xzf mcp-publisher.tar.gz mcp-publisher
          chmod +x mcp-publisher

      - name: Publish to the official MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish server.json
